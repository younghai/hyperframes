<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #07110d;
      }
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #07110d;
      }
      .scene {
        position: absolute;
        inset: 0;
        overflow: hidden;
        opacity: 0;
      }
      #scene-hook {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="6"
      data-width="1920"
      data-height="1080"
    >
      <!-- First sub-comp at near-zero start: the bug trigger -->
      <div
        id="scene-hook"
        class="scene"
        data-layout-allow-overflow
        data-composition-id="hook"
        data-composition-src="compositions/hook.html"
        data-start="0.001"
        data-duration="2.0"
        data-track-index="0"
      ></div>

      <!-- Second sub-comp at a later start: works correctly -->
      <div
        id="scene-later"
        class="scene"
        data-layout-allow-overflow
        data-composition-id="later"
        data-composition-src="compositions/later.html"
        data-start="2.5"
        data-duration="3.5"
        data-track-index="1"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      // Transition: hook zooms out at 2.5s
      tl.to("#scene-hook", { scale: 2.5, opacity: 0, duration: 0.4, ease: "power3.in" }, 2.5);
      tl.fromTo(
        "#scene-later",
        { scale: 0.5, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.4, ease: "power3.out" },
        2.65,
      );

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
